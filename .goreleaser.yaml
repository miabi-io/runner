version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: miabi-runner
    main: .
    binary: miabi-runner
    env:
      - CGO_ENABLED=0
    # A build runner talks to a local Docker/BuildKit daemon, so Linux is the
    # primary target; darwin is included for local development on Docker Desktop.
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}

archives:
  - id: miabi-runner
    name_template: "miabi-runner_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: miabi-io
    name: runner
